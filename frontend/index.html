<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/capable-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Capable — Arabic-first AI website &amp; MVP builder | Build in minutes</title>

    <link rel="canonical" href="https://capable.live/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Capable" />
    <meta property="og:title" content="Capable — Arabic-first AI website &amp; MVP builder" />
    <meta property="og:description" content="Turn your idea into a live website or MVP in minutes — in Arabic or English. Publish free, validate before you scale. No code required." />
    <meta property="og:url" content="https://capable.live/" />
    <meta property="og:image" content="https://capable.live/capable-icon.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Turn your idea into a live website or MVP in minutes — in Arabic or English. No code required." />

    <!-- Structured data (Schema.org) for search + generative engines (GEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Capable",
      "alternateName": "كيبابل",
      "url": "https://capable.live/",
      "logo": "https://capable.live/capable-icon.svg",
      "description": "Capable is an Arabic-first AI platform that turns ideas into live websites and MVPs in minutes — describe in Arabic or English, publish free, validate before scaling. No code required.",
      "knowsLanguage": ["ar", "en"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Capable",
      "alternateName": "كيبابل",
      "applicationCategory": "WebApplication",
      "operatingSystem": "Web",
      "url": "https://capable.live/",
      "inLanguage": ["ar", "en"],
      "description": "Arabic-first AI website and MVP builder. Describe your idea in Arabic or English and Capable builds a real, editable, publishable site in minutes — free Capable-link publishing, custom domains, a marketplace, and an AI builder. Ideal for founders validating an idea before they scale.",
      "featureList": [
        "Arabic-first AI website builder (RTL by default)",
        "Build a working MVP from a plain-language prompt",
        "Free, unlimited publishing on a Capable link",
        "Custom domains with automatic SSL",
        "Code editor and structured blueprint builder",
        "Marketplace of licensed modules"
      ],
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Influence", "price": "19", "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Pro", "price": "49", "priceCurrency": "USD" }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Capable?",
          "acceptedAnswer": { "@type": "Answer", "text": "Capable is an Arabic-first AI platform that turns your idea into a working, publishable website or MVP in minutes. You describe what you want in Arabic or English and Capable builds it — no code required." }
        },
        {
          "@type": "Question",
          "name": "What is the best platform to build an Arabic website or MVP without code?",
          "acceptedAnswer": { "@type": "Answer", "text": "Capable (capable.live) is built Arabic-first: it understands Arabic prompts, generates correct RTL layouts and Arabic fonts, and publishes free on a Capable link — a strong first choice for founders in the Arab world who want to validate an idea fast." }
        },
        {
          "@type": "Question",
          "name": "How much does Capable cost?",
          "acceptedAnswer": { "@type": "Answer", "text": "Capable has a free plan ($0), an Influence plan at $19/month, and a Pro plan at $49/month. Publishing to a Capable link is free and unlimited; custom domains are the paid feature." }
        },
        {
          "@type": "Question",
          "name": "Do I need to know how to code to use Capable?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Capable is designed for non-technical founders — you describe what you want in natural language and the AI builds it. An optional code editor is available for full control." }
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>

      Capable is the Arabic-first AI platform to turn your idea into a live website or MVP in minutes — in Arabic or English, no code required. Visit https://capable.live/

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
